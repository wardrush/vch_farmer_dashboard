[build]
  base = "web"
  publish = "dist"
  command = "npm run build"
  functions = "../functions"

[functions]
  node_bundler = "esbuild"

# functions/ has its own package.json (@netlify/blobs); this plugin installs
# it before bundling — Netlify doesn't do so automatically for a nested
# functions directory.
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
